<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
         body {
            background: #786040;
            font-family: Georgia, serif;
        }

        #formContainer {
            background: white;
            width: 500px;
            margin: 50px auto;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 8px solid #123a8c;
        }

        .jesusImg {
            position: relative;
            height: 200px;
            background: url("images/jesus_feeds_5000.jpeg") center/cover no-repeat;
        }
        .imgTxt {
            position: absolute;
            bottom: 20px;
            left: 30px;
            color: white;
            text-shadow: 2px 2px 6px black;
        }
        h3 {
            text-align: center;
            margin: 20px 0;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: white;
            border: none;
            padding: 4px 8px;
        }

            form {
                display: flex;
                flex-direction: column;
                padding: 20px;
            } 

    </style>




</head>

<body>

 

    <div id="formContainer">
        
           <div class="jesusImg">
            <button type="button" id="closeBtn">X</button>
            <div class="imgTxt">
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="scriptureBar">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon" style="height: 110px; margin: 5px;">
            <img src="images/old_testament.webp" alt="Bible" style="height: 110px; margin: 5px;">
            <img src="images/new_testament.webp" alt="Bible" style="height: 110px; margin: 5px;">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants" style="height: 110px; margin: 5px;">
            <img src="images/pearl_of_great_price.webp" alt="pearl of great price" style="height: 110px; margin: 5px;">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
